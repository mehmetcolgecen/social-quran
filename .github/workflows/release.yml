# main'e push'ta üç imajı ghcr.io'ya yayınlar.
# Her mimari kendi native runner'ında derlenir (QEMU yok: emülasyonda next build
# güvenilmez ve yavaş), merge-manifests işi ikisini tek etikette birleştirir.
# K3S tarafında güncelleme: kubectl -n sosyal-kuran rollout restart deploy/web deploy/api
# (veya kustomization.yaml'da tag sabitleyip apply — ileride ArgoCD önerilir).
name: Release images
on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        image: [sosyal-kuran-web, sosyal-kuran-api, sosyal-kuran-data]
        os: [ubuntu-latest, ubuntu-24.04-arm]
        include:
          - image: sosyal-kuran-web
            dockerfile: apps/web/Dockerfile
          - image: sosyal-kuran-api
            dockerfile: apps/api/Dockerfile
          - image: sosyal-kuran-data
            dockerfile: packages/quran-data/Dockerfile
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }},mode=max

  merge-manifests:
    needs: build-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [sosyal-kuran-web, sosyal-kuran-api, sosyal-kuran-data]
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Mimari imajları tek etikette birleştir
        run: |
          base=ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          docker buildx imagetools create \
            -t "$base:latest" -t "$base:${{ github.sha }}" \
            "$base:${{ github.sha }}-amd64" "$base:${{ github.sha }}-arm64"
