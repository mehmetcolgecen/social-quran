# main'e push'ta üç imajı ghcr.io'ya yayınlar.
# K3S tarafında güncelleme: kubectl -n sosyal-kuran rollout restart deploy/web deploy/api
# (veya kustomization.yaml'da tag sabitleyip apply — ileride ArgoCD önerilir).
name: Release images
on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: sosyal-kuran-web
            dockerfile: apps/web/Dockerfile
          - image: sosyal-kuran-api
            dockerfile: apps/api/Dockerfile
          - image: sosyal-kuran-data
            dockerfile: packages/quran-data/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
