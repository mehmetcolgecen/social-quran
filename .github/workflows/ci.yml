name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck web
        run: npm run typecheck -w apps/web
      - name: Typecheck api
        run: npm run typecheck -w apps/api
      # DB'siz build: docker imaj derlemesiyle aynı koşul (data/processed yok).
      # db.ts'in import anında DB açmaya dönmesi gibi gerilemeleri erken yakalar.
      - name: Build web (DB'siz)
        run: npm run build -w apps/web
