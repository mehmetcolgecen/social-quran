apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: sosyal-kuran
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
          ports: [{ containerPort: 6379 }]
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { memory: 192Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: sosyal-kuran
spec:
  selector: { app: redis }
  ports: [{ port: 6379 }]
