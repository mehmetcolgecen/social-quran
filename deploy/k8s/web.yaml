apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: sosyal-kuran
spec:
  replicas: 2
  selector:
    matchLabels: { app: web }
  template:
    metadata:
      labels: { app: web }
    spec:
      containers:
        - name: web
          image: ghcr.io/mehmetcolgecen/sosyal-kuran-web:latest
          env:
            - name: QURAN_DATA_ROOT
              value: /srv
            - name: API_URL
              value: http://api:4000
            # {origin}: istekteki domain — her site kendi /auth adresini kullanır
            - name: OIDC_ISSUER
              value: "{origin}/auth/realms/sosyal-kuran"
            - name: OIDC_CLIENT_ID
              value: sosyal-kuran-web
            - name: OIDC_CLIENT_SECRET
              valueFrom: { secretKeyRef: { name: web-oidc, key: client-secret } }
            - name: SESSION_SECRET
              valueFrom: { secretKeyRef: { name: web-oidc, key: session-secret } }
          ports: [{ containerPort: 3000 }]
          volumeMounts:
            - name: data
              mountPath: /srv/data
              readOnly: true
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: 200m, memory: 384Mi }
            limits: { memory: 1Gi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: quran-data
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: sosyal-kuran
spec:
  selector: { app: web }
  ports: [{ port: 3000 }]
