# Traefik (K3S yerleşik) + cert-manager + Let's Encrypt.
# cert-manager kurulumu: kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.3/cert-manager.yaml
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: mehmetcolgecen@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: traefik
---
# İlk denemeler için staging (rate limit'e takılmamak adına):
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: mehmetcolgecen@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: traefik
---
# HTTP → HTTPS kalıcı yönlendirme
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: https-redirect
  namespace: sosyal-kuran
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sosyal-kuran
  namespace: sosyal-kuran
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: sosyal-kuran-https-redirect@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts: [sosyal-kuran.com, www.sosyal-kuran.com, social-quran.com, www.social-quran.com]
      secretName: sosyal-kuran-tls
  rules:
    - host: sosyal-kuran.com
      http: &site
        paths:
          - path: /auth
            pathType: Prefix
            backend: { service: { name: keycloak, port: { number: 8080 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: web, port: { number: 3000 } } }
    - host: www.sosyal-kuran.com
      http: *site
    - host: social-quran.com
      http: *site
    - host: www.social-quran.com
      http: *site
