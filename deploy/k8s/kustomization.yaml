apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: sosyal-kuran
resources:
  - namespace.yaml
  - cnpg-cluster.yaml
  - redis.yaml
  - quran-data.yaml
  - keycloak.yaml
  - api.yaml
  - web.yaml
  - ingress.yaml
configMapGenerator:
  - name: keycloak-realm
    files:
      - sosyal-kuran-realm.json=keycloak-realm.json
generatorOptions:
  disableNameSuffixHash: true
images:
  - name: ghcr.io/DEGISTIR-github-kullanici/sosyal-kuran-web
    newTag: latest
  - name: ghcr.io/DEGISTIR-github-kullanici/sosyal-kuran-api
    newTag: latest
  - name: ghcr.io/DEGISTIR-github-kullanici/sosyal-kuran-data
    newTag: latest
