# ÖRNEK — gerçek değerlerle 'secrets.yaml' olarak kaydedin (git'e girmez) ve uygulayın.
# Üretim önerisi: sealed-secrets veya SOPS.
apiVersion: v1
kind: Secret
metadata:
  name: web-oidc
  namespace: sosyal-kuran
stringData:
  client-secret: DEGISTIR-keycloak-client-secret        # Keycloak > client > credentials
  session-secret: DEGISTIR-en-az-32-karakter-rastgele   # openssl rand -base64 32
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin
  namespace: sosyal-kuran
stringData:
  username: admin
  password: DEGISTIR-guclu-parola
---
# CNPG yedekleri için S3 uyumlu erişim (bucket hazır değilse cnpg-cluster.yaml'daki
# backup bloğunu ve ScheduledBackup'ı geçici olarak yorumlayın)
apiVersion: v1
kind: Secret
metadata:
  name: backup-s3
  namespace: sosyal-kuran
stringData:
  ACCESS_KEY_ID: DEGISTIR
  SECRET_ACCESS_KEY: DEGISTIR
