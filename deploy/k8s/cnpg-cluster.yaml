# PostgreSQL — CloudNativePG operatörü gerektirir:
#   kubectl apply --server-side -f https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.25/releases/cnpg-1.25.1.yaml
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: sosyal-kuran-db
  namespace: sosyal-kuran
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  storage:
    size: 8Gi
  bootstrap:
    initdb:
      database: sosyal_kuran
      owner: app
      postInitSQL:
        # Keycloak aynı cluster'da ayrı veritabanı kullanır
        - CREATE DATABASE keycloak OWNER app
  # Yedekleme: S3 uyumlu bir hedef gerektirir (secrets.yaml içindeki backup-s3).
  # Bucket hazır olana kadar bu blok ve ScheduledBackup yorumda bırakılabilir.
  backup:
    barmanObjectStore:
      destinationPath: s3://sosyal-kuran-backup/pg
      endpointURL: https://DEGISTIR-s3-endpoint.example.com
      s3Credentials:
        accessKeyId:
          name: backup-s3
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: backup-s3
          key: SECRET_ACCESS_KEY
    retentionPolicy: 14d
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: sosyal-kuran-db-nightly
  namespace: sosyal-kuran
spec:
  cluster:
    name: sosyal-kuran-db
  schedule: "0 30 2 * * *"   # her gece 02:30
  backupOwnerReference: self
